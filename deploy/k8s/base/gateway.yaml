# pg-gateway — the TCP data path. Routes come from ConfigMap
# `pg-gateway-routes` (the reconciler creates/updates it; an empty seed here
# lets the pod start before the first publish). TLS is the wildcard cert
# cert-manager writes to secret `pg-gateway-tls` (generated by bootstrap.sh —
# domain-dependent). Wake-on-connect env from secret `ndb-gateway-env`
# (PGGW_GATEWAY_TOKEN). The Service is type LoadBalancer: on k3s, klipper-lb
# binds host port 5432 — the VM's public IP *is* the L4 endpoint.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-gateway-routes
  namespace: nimbusdb-gateway
data:
  routes.json: |
    {"endpoints": {}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-gateway
  namespace: nimbusdb-gateway
spec:
  replicas: 1
  strategy:
    # Single-node profile (ADR-022): a rolling update needs headroom for a
    # second pod that a small VM may not have — the replacement then sits
    # Pending on "Insufficient cpu" while the old pod keeps the deployment
    # wedged. Recreate trades a brief connect blip for guaranteed progress.
    type: Recreate
  selector:
    matchLabels: { app: pg-gateway }
  template:
    metadata:
      labels: { app: pg-gateway }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/zenulbashar/zaledb-gateway:latest
          imagePullPolicy: Always
          env:
            - name: PGGW_LISTEN_ADDR
              value: ":5432"
            - name: PGGW_METRICS_ADDR
              value: ":9090"
            - name: PGGW_ROUTES_FILE
              value: /etc/pg-gateway/routes.json
            - name: PGGW_TLS_CERT_FILE
              value: /etc/pg-gateway/tls/tls.crt
            - name: PGGW_TLS_KEY_FILE
              value: /etc/pg-gateway/tls/tls.key
            - name: PGGW_CONTROL_PLANE_URL
              value: http://ndb-api.nimbusdb-platform.svc:8080
          envFrom:
            - secretRef: { name: ndb-gateway-env }
          ports:
            - containerPort: 5432
            - containerPort: 9090
          readinessProbe:
            httpGet: { path: /healthz, port: 9090 }
          livenessProbe:
            httpGet: { path: /healthz, port: 9090 }
            initialDelaySeconds: 10
          volumeMounts:
            - name: routes
              mountPath: /etc/pg-gateway
            - name: tls
              mountPath: /etc/pg-gateway/tls
              readOnly: true
          resources:
            requests: { cpu: 100m, memory: 128Mi }
      volumes:
        - name: routes
          configMap: { name: pg-gateway-routes }
        - name: tls
          secret: { secretName: pg-gateway-tls }
---
apiVersion: v1
kind: Service
metadata:
  name: pg-gateway
  namespace: nimbusdb-gateway
spec:
  type: LoadBalancer
  selector: { app: pg-gateway }
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
