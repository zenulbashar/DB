# Control-plane REST API. Env comes from secret `ndb-api-env` (bootstrap.sh):
# DATABASE_URL, NDB_BOOTSTRAP_TOKEN, NDB_GATEWAY_TOKEN, NDB_ADMIN_TOKEN,
# NDB_KEKS, NDB_ACTIVE_KEK, NDB_ENV, NDB_DOMAIN. The Ingress (api.<domain>) is
# domain-dependent and generated by bootstrap.sh.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndb-api
  namespace: nimbusdb-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: ndb-api }
  template:
    metadata:
      labels: { app: ndb-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/zenulbashar/zaledb-api:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef: { name: ndb-api-env }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ndb-api
  namespace: nimbusdb-platform
spec:
  selector: { app: ndb-api }
  ports:
    - port: 8080
