# Reconciler ServiceAccount + the cluster-scope permissions it needs: tenant
# namespaces and everything it ensures inside them, plus the gateway route
# ConfigMap. The reconciler is the only platform component with cluster-wide
# write access (SECURITY_MODEL §4).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nimbusdb-reconciler
  namespace: nimbusdb-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nimbusdb-reconciler
rules:
  - apiGroups: [""]
    resources: [namespaces, resourcequotas, secrets, configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters, poolers, scheduledbackups, backups]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nimbusdb-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nimbusdb-reconciler
subjects:
  - kind: ServiceAccount
    name: nimbusdb-reconciler
    namespace: nimbusdb-platform
