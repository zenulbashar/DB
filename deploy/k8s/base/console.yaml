# Console (tenant console + /admin operator shell + /kb). NDB_API_URL is
# domain-dependent (browser server-actions call the public API host), so it
# lives in secret `ndb-console-env` created by bootstrap.sh. The Ingress
# (console.<domain>) is generated by bootstrap.sh.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndb-console
  namespace: nimbusdb-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: ndb-console }
  template:
    metadata:
      labels: { app: ndb-console }
    spec:
      containers:
        - name: console
          image: ghcr.io/zenulbashar/zaledb-console:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef: { name: ndb-console-env }
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /kb, port: 3000 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 100m, memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ndb-console
  namespace: nimbusdb-platform
spec:
  selector: { app: ndb-console }
  ports:
    - port: 3000
